<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="sidebar"></div>
  <div id="sidebar-resizer"></div>
  <div id="main">
    <div id="tab-bar"></div>
    <div id="content-scroll">
      <div id="content"></div>
    </div>
    <div id="empty-state">Ouvrir un fichier Markdown pour commencer</div>
  </div>
  <button id="sidebar-toggle" title="Afficher/masquer la sidebar">☰</button>
  <button id="width-toggle" title="Basculer pleine largeur / centré">⇔</button>
  <script type="module" src="bundle.js"></script>
</body>
</html>
